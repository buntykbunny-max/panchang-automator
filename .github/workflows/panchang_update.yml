name: Daily Panchang Auto-Update

on:
  schedule:
    # 🌟 रोज़ सुबह 4:00 बजे (IST के हिसाब से) चलेगा
    - cron: '30 22 * * *' 
  workflow_dispatch:

jobs:
  update-panchang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install firebase-admin axios

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # 🚨 API Key को सीक्रेट्स से ले रहे हैं
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }} 
        run: |
          node -e "
            const { initializeApp, cert } = require('firebase-admin/app');
            const { getFirestore } = require('firebase-admin/firestore');
            const axios = require('axios');
            
            // 🌟 सीक्रेट की को पढ़ें
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            
            // 🌟 नए और सही तरीके से Initialize करें
            initializeApp({
              credential: cert(serviceAccount)
            });
            
            const db = getFirestore();
            
            async function run() {
              try {
                const todayId = new Date().toISOString().split('T')[0];
                const zodiacSigns = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];
                let allData = {};
                
                console.log('राशिफल फेच करना शुरू कर रहे हैं...');
                
                for (let sign of zodiacSigns) {
                  console.log('Fetching for: ' + sign);
                  
                  // URL 
                  const url = 'https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/monthly/?zodiacSign=' + sign;
                  
                  const response = await axios.get(url, {
                    headers: { 'X-RapidAPI-Key': process.env.RAPIDAPI_KEY }
                  });
                  
                  allData[sign] = response.data;
                  await new Promise(r => setTimeout(r, 500)); // API को रिलैक्स करने का टाइम
                }
                
                await db.collection('daily_rashifal').doc(todayId).set(allData, { merge: true });
                console.log('✅ सभी 12 राशियों का राशिफल Firebase में सफलतापूर्वक सेव हो गया!');
              } catch (err) {
                console.error('❌ Error:', err.message);
                process.exit(1);
              }
            }
            run();
          "
