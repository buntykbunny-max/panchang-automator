name: Daily Panchang Auto-Update

on:
  schedule:
    # 🌟 रोज़ सुबह 4:00 बजे (IST के हिसाब से) चलेगा
    - cron: '30 22 * * *' 
  workflow_dispatch:

jobs:
  update-panchang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install firebase-admin axios

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RAPIDAPI_KEY: '74fc4b54a4msh8061068cefa2fe6p125daajsn4e3a57929e4d'
        run: |
         node -e "
            const admin = require('firebase-admin');
            const axios = require('axios');
            
            // 🌟 सुरक्षित तरीके से JSON को लोड करें
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            
            // 🌟 इनिशियलाइज़ेशन को सही करें
            if (!admin.apps.length) {
              admin.initializeApp({
                credential: admin.credential.cert(serviceAccount)
              });
            }
            
            const db = admin.firestore();
            
            async function run() {
              try {
                const todayId = new Date().toISOString().split('T')[0];
                const response = await axios.get('https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/daily?zodiacSign=aries', {
                  headers: { 'X-RapidAPI-Key': process.env.RAPIDAPI_KEY }
                });
                
                await db.collection('daily_rashifal').doc(todayId).set({
                  aries: response.data
                }, { merge: true });
                
                console.log('✅ Updated for today!');
              } catch (err) {
                console.error('❌ Error in run function:', err);
                process.exit(1);
              }
            }
            run();
          "
