name: Daily Horoscope Updater

on:
  schedule:
    # 30 22 * * * का मतलब है UTC का 10:30 PM (यानी भारत का सुबह 4:00 बजे)
    - cron: '30 22 * * *'
  workflow_dispatch: # यह आपको GitHub में मैन्युअली 'Run' बटन दबाने की सुविधा देगा

jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase
        run: npm install firebase-admin

      - name: Run Horoscope Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node horoscope.js
