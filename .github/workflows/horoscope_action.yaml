name: Daily Horoscope Updater

on:
  schedule:
    - cron: '*/5 * * * *'   # Har 5 minute mein (test ke liye)
  workflow_dispatch:

jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 🌟 यहाँ दोनों पैकेजेस एक साथ इंस्टॉल होने चाहिए 🌟
      - name: Install Dependencies
        run: npm install firebase-admin google-translate-api-x

      - name: Run Horoscope Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node horoscope.js
