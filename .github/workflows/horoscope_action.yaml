name: Daily Horoscope Updater

on:
  schedule:
    - cron: '*/10 * * * *'   # Test: har 10 minute mein (*/5 se thoda safe)
  workflow_dispatch:

jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci   # Better than npm install

      - name: Run Horoscope Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node horoscope.js
