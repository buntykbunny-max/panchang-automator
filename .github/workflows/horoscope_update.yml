name: Daily Horoscope Auto-Update

on:
  schedule:
    - cron: '30 22 * * *' 
  workflow_dispatch:
 
jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🌟 यहाँ हमने 'google-translate-api-x' को भी इनस्टॉल किया है
      - name: Install dependencies
        run: npm install firebase-admin axios google-translate-api-x

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }} 
        run: |
          node -e "
            const { initializeApp, cert } = require('firebase-admin/app');
            const { getFirestore } = require('firebase-admin/firestore');
            const axios = require('axios');
            const translate = require('google-translate-api-x'); // 🌟 ट्रांसलेशन टूल
            
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            
            initializeApp({
              credential: cert(serviceAccount)
            });
            
            const db = getFirestore();
            
            async function run() {
              try {
                const todayId = new Date().toISOString().split('T')[0];
                const zodiacSigns = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];
                let allData = {};
                
                console.log('राशिफल फेच और ट्रांसलेट करना शुरू कर रहे हैं...');
                
                for (let sign of zodiacSigns) {
                  console.log('Fetching & Translating for: ' + sign);
                  
                  const url = 'https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/weekly/?zodiacSign=' + sign;
                  
                  const response = await axios.get(url, {
                    headers: { 'X-RapidAPI-Key': process.env.RAPIDAPI_KEY }
                  });
                  
                  // 🌟 API से मिला इंग्लिश डेटा
                  const englishData = response.data;
                  
                  // 🚨 ध्यान दें: यहाँ 'prediction' या 'description' वो शब्द होना चाहिए जिसमें असली राशिफल लिखा है। 
                  // मान लेते हैं कि API में वो 'prediction' के नाम से आता है:
                  let textToTranslate = englishData.prediction || JSON.stringify(englishData); 
                  
                  // 🌟 हिंदी में ट्रांसलेट करें
                  const translatedResult = await translate(textToTranslate, { to: 'hi' });
                  
                  // ट्रांसलेटेड डेटा को लिस्ट में जोड़ें
                  allData[sign] = Object.assign({}, englishData, {
                    hindi_prediction: translatedResult.text
                  });
                  
                  await new Promise(r => setTimeout(r, 1000)); // ट्रांसलेशन API को रिलैक्स करने का टाइम
                }
                
                await db.collection('daily_rashifal').doc(todayId).set(allData, { merge: true });
                console.log('✅ सभी 12 राशियों का राशिफल हिंदी में ट्रांसलेट होकर Firebase में सेव हो गया!');
              } catch (err) {
                console.error('❌ Error:', err.message);
                process.exit(1);
              }
            }
            run();
          "
