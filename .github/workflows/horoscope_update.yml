name: Daily Horoscope Auto-Update

on:
  schedule:
    - cron: '30 22 * * *' 
  workflow_dispatch:
 
jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🌟 यहाँ हमने 'google-translate-api-x' को भी इनस्टॉल किया है
      - name: Install dependencies
        run: npm install firebase-admin axios google-translate-api-x

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }} 
        run: |
          node -e "
            const { initializeApp, cert } = require('firebase-admin/app');
            const { getFirestore } = require('firebase-admin/firestore');
            const axios = require('axios');
            
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            
            initializeApp({
              credential: cert(serviceAccount)
            });
            
            const db = getFirestore();
            
            async function run() {
              try {
                const todayId = new Date().toISOString().split('T')[0];
                const sign = 'leo'; // 🌟 सिर्फ़ एक राशि 
                
                console.log('सिर्फ़ Weekly डेटा (Leo) के लिए टेस्टिंग शुरू...');
                
                const weeklyUrl = 'https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/weekly/?zodiacSign=' + sign;
                
                const response = await axios.get(weeklyUrl, {
                  headers: { 'X-RapidAPI-Key': process.env.RAPIDAPI_KEY }
                });
                
                console.log('✅ API से डेटा आ गया! यह रहा डेटा:', JSON.stringify(response.data).substring(0, 100) + '...');
                
                // 🌟 Firebase में सेव करें
                let weeklyData = {};
                weeklyData[sign] = response.data;
                
                await db.collection('weekly_rashifal').doc(todayId).set(weeklyData, { merge: true });
                
                console.log('🎉 सक्सेस! Weekly डेटा Firebase में सेव हो गया!');
                
              } catch (err) {
                console.error('❌ Error आ गया:', err.message);
                if (err.response) {
                  console.error('API Error Details:', err.response.data);
                }
                process.exit(1);
              }
            }
            run();
          "
