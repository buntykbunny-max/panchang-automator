name: Daily Horoscope Auto-Update

on:
  schedule:
    - cron: '30 22 * * *' 
  workflow_dispatch:
 
jobs:
  update-horoscope:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🌟 यहाँ हमने 'google-translate-api-x' को भी इनस्टॉल किया है
      - name: Install dependencies
        run: npm install firebase-admin axios google-translate-api-x

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }} 
        run: |
         node -e "
            const { initializeApp, cert } = require('firebase-admin/app');
            const { getFirestore } = require('firebase-admin/firestore');
            const axios = require('axios');
            
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            
            initializeApp({
              credential: cert(serviceAccount)
            });
            
            const db = getFirestore();
            
            async function run() {
              try {
                const todayId = new Date().toISOString().split('T')[0];
                const zodiacSigns = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];
                
                // 🌟 दोनों के लिए अलग-अलग लिस्ट (Objects) बना ली हैं
                let dailyData = {};
                let weeklyData = {};
                
                console.log('Daily और Weekly राशिफल फेच करना शुरू कर रहे हैं...');
                
                for (let sign of zodiacSigns) {
                  console.log('Fetching for: ' + sign);
                  
                  const dailyUrl = 'https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/?zodiacSign=' + sign;
                  const weeklyUrl = 'https://best-daily-astrology-and-horoscope-api.p.rapidapi.com/api/Detailed-Horoscope/weekly/?zodiacSign=' + sign;
                  const headers = { 'X-RapidAPI-Key': process.env.RAPIDAPI_KEY };
                  
                  // Daily मँगवाएं
                  const dailyResponse = await axios.get(dailyUrl, { headers });
                  await new Promise(r => setTimeout(r, 500)); 
                  
                  // Weekly मँगवाएं
                  const weeklyResponse = await axios.get(weeklyUrl, { headers });
                  await new Promise(r => setTimeout(r, 500)); 
                  
                  // 🌟 दोनों को उनकी अपनी-अपनी लिस्ट में डाल रहे हैं
                  dailyData[sign] = dailyResponse.data;
                  weeklyData[sign] = weeklyResponse.data;
                }
                
                // 🌟 1. Daily डेटा को 'daily_rashifal' कलेक्शन में सेव करें
                await db.collection('daily_rashifal').doc(todayId).set(dailyData, { merge: true });
                console.log('✅ Daily राशिफल सेव हो गया!');
                
                // 🌟 2. Weekly डेटा को 'weekly_rashifal' कलेक्शन में सेव करें
                await db.collection('weekly_rashifal').doc(todayId).set(weeklyData, { merge: true });
                console.log('✅ Weekly राशिफल सेव हो गया!');
                
                console.log('🎉 दोनों राशिफल अलग-अलग कलेक्शन में सफलतापूर्वक सेव हो गए!');
              } catch (err) {
                console.error('❌ Error:', err.message);
                process.exit(1);
              }
            }
            run();
          "
