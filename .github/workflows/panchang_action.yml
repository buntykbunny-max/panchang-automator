name: Daily Panchang Updater

on:
  schedule:
    # 15 22 * * * का मतलब है भारत का सुबह 4:15 बजे
    - cron: '15 22 * * *'
  workflow_dispatch:

jobs:
  update-panchang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install firebase-admin astronomy-engine

      - name: Run Panchang Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node panchang.js
